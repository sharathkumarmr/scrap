<!DOCTYPE html>
<html>
<head>
    <title>Live Metal Tracker</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1f29; padding: 30px; border-radius: 15px; text-align: center; min-width: 200px; margin: 10px; border: 1px solid #2d333b; }
        .price { font-size: 3rem; font-weight: bold; margin: 10px 0; transition: 0.3s; }
        .up { color: #2ecc71; } .down { color: #e74c3c; }
        .label { color: #848d97; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">GOLD (XAU/USD)</div>
        <div id="xau-price" class="price">0.00</div>
    </div>
    <div class="card">
        <div class="label">SILVER (XAG/USD)</div>
        <div id="xag-price" class="price">0.00</div>
    </div>
    <script>
        const socket = io();
        let old = { "XAU/USD": 0, "XAG/USD": 0 };
        socket.on("pricePoint", (data) => {
            const el = document.getElementById(data.symbol === "XAU/USD" ? "xau-price" : "xag-price");
            el.className = data.price > old[data.symbol] ? "price up" : "price down";
            el.innerText = data.price.toFixed(2);
            old[data.symbol] = data.price;
        });
    </script>
</body>
</html>
