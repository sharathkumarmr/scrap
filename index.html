<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU/XAG Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
  h1 { margin-bottom: 30px; }
  .price { font-size: 2em; margin: 20px 0; }
</style>
</head>
<body>

<h1>XAU/USD & XAG/USD Live Prices</h1>
<div class="price" id="xau">XAU/USD: --</div>
<div class="price" id="xag">XAG/USD: --</div>

<script>
  const socket = io();

  socket.on("pricePoint", data => {
    if (data.symbol === "XAU/USD") {
      document.getElementById("xau").innerText = `XAU/USD: ${data.price}`;
    } else if (data.symbol === "XAG/USD") {
      document.getElementById("xag").innerText = `XAG/USD: ${data.price}`;
    }
  });
</script>

</body>
</html>
